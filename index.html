<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft 365 Roadmap — Live</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f4f0; --surface:#ffffff; --surface2:#f0ede8;
  --text:#1a1916; --muted:#6b6860; --faint:#a09d97;
  --border:rgba(0,0,0,0.08); --border-s:rgba(0,0,0,0.15);
  --green-bg:#e6f4eb; --green-t:#1a6130;
  --amber-bg:#fef3dc; --amber-t:#7a4f00;
  --purple-bg:#eeebfd; --purple-t:#4a3aaa;
  --gray-bg:#ebebeb;  --gray-t:#4a4a4a;
  --blue-bg:#e6f0fd;  --blue-t:#1a4fa0;
  --red-bg:#fdecea;   --red-t:#a02020;
  --orange-bg:#fff0e6;--orange-t:#8c4300;
  --new-bg:#fff7e0;   --new-t:#7a5000;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.hdr { background:var(--surface); border-bottom:1px solid var(--border); padding:1.1rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; position:sticky; top:0; z-index:20; }
.hdr h1 { font-size:17px; font-weight:600; }
.hdr p  { font-size:12px; color:var(--muted); margin-top:2px; }
.hdr-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
#last-updated { font-size:11px; color:var(--faint); background:var(--surface2); padding:4px 11px; border-radius:100px; }
#refresh-btn { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:var(--blue-t); background:var(--blue-bg); border:1px solid rgba(26,79,160,0.18); border-radius:100px; padding:5px 13px; cursor:pointer; font-family:inherit; transition:opacity .12s; }
#refresh-btn:hover { opacity:.75; }
#refresh-btn svg { flex-shrink:0; }
#refresh-btn.loading svg { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.main { max-width:960px; margin:0 auto; padding:1.75rem 1.5rem 4rem; }

.filter-row { display:flex; align-items:flex-start; gap:1.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.filter-group { flex:1; min-width:200px; }
.filter-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--faint); margin-bottom:7px; }
.filter-bar { display:flex; flex-wrap:wrap; gap:6px; }
.fb { padding:5px 13px; border-radius:100px; border:1px solid var(--border-s); background:var(--surface); color:var(--muted); font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; transition:all .12s; }
.fb:hover { background:var(--surface2); }
.fb.on { background:var(--text); color:#fff; border-color:transparent; }
.fb.ao-copilot    { background:var(--purple-bg); color:var(--purple-t); border-color:transparent; }
.fb.ao-teams      { background:var(--blue-bg);   color:var(--blue-t);   border-color:transparent; }
.fb.ao-excel      { background:var(--green-bg);  color:var(--green-t);  border-color:transparent; }
.fb.ao-word       { background:var(--blue-bg);   color:var(--blue-t);   border-color:transparent; }
.fb.ao-powerpoint { background:var(--orange-bg); color:var(--orange-t); border-color:transparent; }
.fb.ao-sharepoint { background:var(--amber-bg);  color:var(--amber-t);  border-color:transparent; }
.fb.ao-purview    { background:var(--red-bg);    color:var(--red-t);    border-color:transparent; }
.fb.ao-outlook    { background:var(--blue-bg);   color:var(--blue-t);   border-color:transparent; }

.divider { height:1px; background:var(--border); margin:1.25rem 0; }

.stats-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }
.stat-pill { font-size:12px; padding:4px 12px; border-radius:100px; }
.stat-total   { background:var(--surface2); color:var(--muted); }
.stat-rolling { background:var(--amber-bg); color:var(--amber-t); }
.stat-dev     { background:var(--blue-bg);  color:var(--blue-t); }
.stat-new     { background:var(--new-bg);   color:var(--new-t); }

.sec-hdr { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); margin:1.75rem 0 .75rem; padding-bottom:7px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sec-count { font-size:11px; font-weight:500; background:var(--surface2); color:var(--faint); padding:2px 8px; border-radius:100px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem 1.1rem; margin-bottom:8px; transition:border-color .15s; }
.card:hover { border-color:var(--border-s); }
.card-pills { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:8px; }
.card-title { font-size:14px; font-weight:500; line-height:1.4; margin-bottom:7px; }
.card-desc  { font-size:12px; color:var(--muted); line-height:1.65; margin-bottom:10px; }
.card-foot  { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.card-dates { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.date-info  { font-size:11px; color:var(--faint); }

.pill { font-size:11px; font-weight:600; padding:3px 9px; border-radius:100px; white-space:nowrap; }
.p-copilot    { background:var(--purple-bg); color:var(--purple-t); }
.p-teams      { background:var(--blue-bg);   color:var(--blue-t); }
.p-excel      { background:var(--green-bg);  color:var(--green-t); }
.p-word       { background:var(--blue-bg);   color:var(--blue-t); }
.p-powerpoint { background:var(--orange-bg); color:var(--orange-t); }
.p-sharepoint { background:var(--amber-bg);  color:var(--amber-t); }
.p-purview    { background:var(--red-bg);    color:var(--red-t); }
.p-outlook    { background:var(--blue-bg);   color:var(--blue-t); }
.p-other      { background:var(--gray-bg);   color:var(--gray-t); }
.p-rolling    { background:var(--amber-bg);  color:var(--amber-t); }
.p-dev        { background:var(--blue-bg);   color:var(--blue-t); }

.new-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; background:var(--new-bg); color:var(--new-t); padding:3px 8px; border-radius:100px; }

.ms-link { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--blue-t); text-decoration:none; padding:3px 9px; border-radius:100px; background:var(--blue-bg); transition:opacity .12s; white-space:nowrap; }
.ms-link:hover { opacity:.75; }

.state-box { text-align:center; padding:3.5rem 1rem; color:var(--muted); font-size:14px; }
.state-box .icon { font-size:36px; margin-bottom:.75rem; }
.state-box h3 { font-size:15px; font-weight:600; color:var(--text); margin-bottom:.5rem; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--blue-t); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Microsoft 365 Roadmap</h1>
    <p>Live data · In development &amp; Rolling out</p>
  </div>
  <div class="hdr-right">
    <span id="last-updated">Nog niet geladen</span>
    <button id="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Vernieuwen
    </button>
  </div>
</div>

<div class="main">
  <div class="filter-row">
    <div class="filter-group">
      <div class="filter-label">Status</div>
      <div class="filter-bar" id="sf">
        <button class="fb on" data-s="all">Alles</button>
        <button class="fb" data-s="rolling">Rolling out</button>
        <button class="fb" data-s="dev">In development</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Nieuw / Al bekend</div>
      <div class="filter-bar" id="nf">
        <button class="fb on" data-n="all">Alles</button>
        <button class="fb" data-n="new">⭐ Nieuw in lijst</button>
        <button class="fb" data-n="known">Al bekend</button>
      </div>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-group">
      <div class="filter-label">Toegevoegd aan roadmap</div>
      <div class="filter-bar" id="af">
        <button class="fb on" data-a="all">Alle</button>
        <button class="fb" data-a="aw">Deze week</button>
        <button class="fb" data-a="am">Deze maand</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Laatst gewijzigd</div>
      <div class="filter-bar" id="mf">
        <button class="fb on" data-m="all">Alle</button>
        <button class="fb" data-m="mw">Deze week</button>
        <button class="fb" data-m="mm">Deze maand</button>
      </div>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-group" style="max-width:100%">
      <div class="filter-label">Applicatie</div>
      <div class="filter-bar" id="apf">
        <button class="fb on" data-p="all">Alle apps</button>
        <button class="fb" data-p="copilot">Copilot</button>
        <button class="fb" data-p="teams">Teams</button>
        <button class="fb" data-p="outlook">Outlook</button>
        <button class="fb" data-p="excel">Excel</button>
        <button class="fb" data-p="word">Word</button>
        <button class="fb" data-p="powerpoint">PowerPoint</button>
        <button class="fb" data-p="sharepoint">SharePoint</button>
        <button class="fb" data-p="purview">Purview</button>
        <button class="fb" data-p="other">Overig</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>
  <div id="stats-bar" class="stats-bar"></div>
  <div id="root"></div>
</div>

<script>
var BASE_IDS = [478611,542182,499428,513274,490565,491016,557276,499659,557983,488800];

function getSeenIds() {
  try { var v = localStorage.getItem('m365_seen_v2'); return v ? new Set(JSON.parse(v)) : new Set(BASE_IDS); }
  catch(e) { return new Set(BASE_IDS); }
}
function saveSeenIds(s) {
  try { localStorage.setItem('m365_seen_v2', JSON.stringify([...s])); } catch(e) {}
}
var SEEN = getSeenIds();
var ALL  = [];
var fS='all', fN='all', fA='all', fM='all', fP='all';

// Minimal CSV parser — handles quoted fields with embedded commas/newlines
function parseCSV(txt) {
  var rows=[], row=[], field='', inQ=false;
  for (var i=0; i<txt.length; i++) {
    var c=txt[i], nc=txt[i+1];
    if (inQ) {
      if (c==='"' && nc==='"') { field+='"'; i++; }
      else if (c==='"') { inQ=false; }
      else { field+=c; }
    } else {
      if (c==='"') { inQ=true; }
      else if (c===',') { row.push(field); field=''; }
      else if (c==='\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (c!=='\r') { field+=c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function appKey(prod) {
  var p=(prod||'').toLowerCase();
  if (p.includes('copilot'))    return 'copilot';
  if (p.includes('teams'))      return 'teams';
  if (p.includes('outlook'))    return 'outlook';
  if (p.includes('excel'))      return 'excel';
  if (p.includes('word'))       return 'word';
  if (p.includes('powerpoint')) return 'powerpoint';
  if (p.includes('sharepoint')) return 'sharepoint';
  if (p.includes('purview'))    return 'purview';
  return 'other';
}
var APLBL = {copilot:'Copilot',teams:'Teams',outlook:'Outlook',excel:'Excel',word:'Word',powerpoint:'PowerPoint',sharepoint:'SharePoint',purview:'Purview',other:'Overig'};
var APCLS = {copilot:'p-copilot',teams:'p-teams',outlook:'p-outlook',excel:'p-excel',word:'p-word',powerpoint:'p-powerpoint',sharepoint:'p-sharepoint',purview:'p-purview',other:'p-other'};

function daysAgo(d) { return d ? (Date.now()-new Date(d).getTime())/864e5 : 9999; }
function fmtD(d)    { return d ? new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}) : ''; }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var LINK = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

var CSVURL   = 'https://www.microsoft.com/releasecommunications/api/v2/m365?responseFormat=csv';
var PROXYURL = 'https://corsproxy.io/?url=' + encodeURIComponent(CSVURL);

function loadData() {
  var btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('root').innerHTML='<div class="state-box"><div class="spinner"></div><h3>Roadmap ophalen…</h3><p style="font-size:12px;margin-top:.5rem;color:var(--faint)">Live data van Microsoft</p></div>';
  document.getElementById('stats-bar').innerHTML='';

  fetch(CSVURL,{mode:'cors'})
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .catch(function(){
      return fetch(PROXYURL).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); });
    })
    .then(handleCSV)
    .catch(showError)
    .finally(function(){ btn.classList.remove('loading'); });
}

function handleCSV(txt) {
  var rows=parseCSV(txt);
  if (rows.length<2) { showError(new Error('Lege respons')); return; }

  // Build header index
  var hdr=rows[0], idx={};
  hdr.forEach(function(h,i){ idx[h.trim().replace(/^\uFEFF/,'')]=i; });
  var iId   = idx['Feature ID']??0;
  var iDesc = idx['Description']??1;
  var iDet  = idx['Details']??2;
  var iStat = idx['Status']??3;
  var iProd = idx['Tags - Product']??5;
  var iAdd  = idx['Added to Roadmap']??9;
  var iMod  = idx['Last Modified']??10;
  var iRel  = idx['Release']??12;

  ALL = rows.slice(1).filter(function(r){
    if (r.length<4) return false;
    var s=(r[iStat]||'').trim().toLowerCase();
    return s==='rolling out'||s==='in development';
  }).map(function(r){
    var id  = parseInt(r[iId])||0;
    var st  = (r[iStat]||'').toLowerCase().includes('rolling')?'rolling':'dev';
    var app = appKey(r[iProd]||'');
    var pl  = (r[iProd]||'').split(',')[0].trim().replace(/^Microsoft\s+/i,'').replace(/\s*\(.*\)$/,'').trim();
    if (!pl||pl.length>28) pl=APLBL[app];
    return {
      id:id, title:(r[iDesc]||'').trim(), desc:(r[iDet]||'').trim(),
      status:st, app:app, prodLabel:pl,
      created:(r[iAdd]||'').trim(), modified:(r[iMod]||'').trim(), release:(r[iRel]||'').trim(),
      isNew:!SEEN.has(id)
    };
  });

  ALL.forEach(function(f){ SEEN.add(f.id); });
  saveSeenIds(SEEN);

  var now=new Date().toLocaleString('nl-NL',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').textContent='Bijgewerkt: '+now;
  render();
}

function showError(err) {
  document.getElementById('root').innerHTML=
    '<div class="state-box">'+
    '<div class="icon">⚠️</div>'+
    '<h3>Kon geen verbinding maken</h3>'+
    '<p style="max-width:440px;margin:.5rem auto 0;line-height:1.6">'+
    'De Microsoft roadmap-API is niet bereikbaar vanuit deze browser.<br>'+
    '<strong>Mogelijke oorzaken:</strong><br>'+
    '• CORS-beveiliging in de browser blokkeert het verzoek<br>'+
    '• Bedrijfsnetwerk of firewall blokkeert de API<br><br>'+
    '<strong>Oplossingen:</strong><br>'+
    '• Probeer een andere browser (Chrome of Edge)<br>'+
    '• Open de pagina buiten het bedrijfsnetwerk<br>'+
    '• Of bekijk de data direct op <a href="https://www.microsoft.com/nl-nl/microsoft-365/roadmap" target="_blank" style="color:var(--blue-t)">microsoft.com/roadmap</a>'+
    '</p>'+
    '<p style="margin-top:1rem;font-size:11px;color:var(--faint)">'+esc(String(err))+'</p>'+
    '</div>';
}

function render() {
  var f=ALL.filter(function(item){
    if (fS!=='all' && item.status!==fS)          return false;
    if (fN==='new'   && !item.isNew)             return false;
    if (fN==='known' &&  item.isNew)             return false;
    if (fA==='aw' && daysAgo(item.created)>7)    return false;
    if (fA==='am' && daysAgo(item.created)>31)   return false;
    if (fM==='mw' && daysAgo(item.modified)>7)   return false;
    if (fM==='mm' && daysAgo(item.modified)>31)  return false;
    if (fP!=='all' && item.app!==fP)             return false;
    return true;
  });

  var rolling=f.filter(function(i){return i.status==='rolling';});
  var dev=f.filter(function(i){return i.status==='dev';});
  var nc=f.filter(function(i){return i.isNew;}).length;

  document.getElementById('stats-bar').innerHTML=
    '<span class="stat-pill stat-total">'+f.length+' items</span>'+
    '<span class="stat-pill stat-rolling">'+rolling.length+' rolling out</span>'+
    '<span class="stat-pill stat-dev">'+dev.length+' in development</span>'+
    (nc>0?'<span class="stat-pill stat-new">⭐ '+nc+' nieuw</span>':'');

  if (!f.length) {
    document.getElementById('root').innerHTML='<div class="state-box"><div class="icon">🔍</div><h3>Geen resultaten</h3><p>Pas de filters aan.</p></div>';
    return;
  }

  function sec(items, emoji, lbl) {
    if (!items.length) return '';
    var cards=items.map(function(item){
      var d=item.desc.length>360?item.desc.slice(0,360)+'…':item.desc;
      var dates=[];
      if (item.created)  dates.push('<span class="date-info">📅 Toegevoegd: '+fmtD(item.created)+'</span>');
      if (item.modified) dates.push('<span class="date-info">✏️ Gewijzigd: '+fmtD(item.modified)+'</span>');
      if (item.release)  dates.push('<span class="date-info">🚀 Release: '+esc(item.release)+'</span>');
      return '<div class="card">'+
        '<div class="card-pills">'+
          '<span class="pill '+APCLS[item.app]+'">'+esc(item.prodLabel)+'</span>'+
          '<span class="pill '+(item.status==='rolling'?'p-rolling':'p-dev')+'">'+(item.status==='rolling'?'Rolling out':'In development')+'</span>'+
          (item.isNew?'<span class="new-badge">⭐ Nieuw</span>':'')+
        '</div>'+
        '<div class="card-title">'+esc(item.title)+'</div>'+
        (d?'<div class="card-desc">'+esc(d)+'</div>':'')+
        '<div class="card-foot">'+
          '<div class="card-dates">'+dates.join('')+'</div>'+
          '<a class="ms-link" href="https://www.microsoft.com/en-us/microsoft-365/roadmap?searchterms='+item.id+'" target="_blank" rel="noopener">'+LINK+' ID '+item.id+'</a>'+
        '</div>'+
      '</div>';
    }).join('');
    return '<div>'+
      '<div class="sec-hdr"><span>'+emoji+' '+lbl+'</span><span class="sec-count">'+items.length+'</span></div>'+
      cards+
    '</div>';
  }

  document.getElementById('root').innerHTML=
    sec(rolling,'🟡','Rolling out — nu in uitrol')+
    sec(dev,'🔵','In development — in ontwikkeling');
}

function wire(id, prop, attr, cls) {
  document.getElementById(id).addEventListener('click',function(e){
    var t=e.target.closest('['+attr+']'); if (!t) return;
    document.querySelectorAll('#'+id+' .fb').forEach(function(b){b.className='fb';});
    var v=t.getAttribute(attr);
    t.classList.add('on');
    if (cls && v!=='all') t.classList.add(cls+v);
    if      (prop==='fS') fS=v;
    else if (prop==='fN') fN=v;
    else if (prop==='fA') fA=v;
    else if (prop==='fM') fM=v;
    else if (prop==='fP') fP=v;
    render();
  });
}
wire('sf','fS','data-s');
wire('nf','fN','data-n');
wire('af','fA','data-a');
wire('mf','fM','data-m');
wire('apf','fP','data-p','ao-');

loadData();
</script>
</body>
</html>
