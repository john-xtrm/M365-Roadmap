name: Ververs Microsoft 365 Roadmap

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-roadmap:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: CSV ophalen via curl
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: nl-NL,nl;q=0.9,en;q=0.8" \
            -H "Referer: https://www.microsoft.com/en-us/microsoft-365/roadmap" \
            "https://www.microsoft.com/releasecommunications/api/v2/m365?responseFormat=csv" \
            -o roadmap.csv
          echo "Bestandsgrootte: $(wc -c < roadmap.csv) bytes"
          head -1 roadmap.csv

      - name: Data verwerken
        run: python3 fetch_roadmap.py

      - name: data.json committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Roadmap bijgewerkt: $(date -u +'%Y-%m-%d')"
          git push
