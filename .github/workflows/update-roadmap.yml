name: Ververs Microsoft 365 Roadmap

on:
  schedule:
    - cron: '0 4 * * 1'   # Elke maandag om 04:00 UTC (05:00 NL wintertijd; 06:00 NL zomertijd)
    - cron: '0 4 * * 3'   # Elke woensdag als fallback bij mislukte maandagrun
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python-afhankelijkheden installeren
        run: pip install deep-translator

      - name: CSV ophalen via curl
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: nl-NL,nl;q=0.9,en;q=0.8" \
            -H "Referer: https://www.microsoft.com/en-us/microsoft-365/roadmap" \
            "https://www.microsoft.com/releasecommunications/api/v2/m365?responseFormat=csv" \
            -o roadmap.csv
          echo "Opgehaald: $(wc -l < roadmap.csv) regels"

      - name: Data verwerken en vertalen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 fetch_roadmap.py

      - name: Archief opruimen (ouder dan 3 maanden)
        run: |
          find archive/ -name "*.json" -mtime +92 -delete 2>/dev/null || true
          echo "Archief opgeruimd"

      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json archive/
          git diff --cached --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "Roadmap bijgewerkt: $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
